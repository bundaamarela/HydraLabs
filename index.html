<!doctype html>
<html lang="pt" data-theme="dark">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Hydra Labs</title>
<style>
/* ══════════════════════════════════════════════════════════════════════
   HYDRA LABS · monochromatic system · zero frameworks
   ══════════════════════════════════════════════════════════════════════ */

/* ── design tokens ─────────────────────────────────────────────────── */
:root {
  --font:      -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Helvetica Neue', sans-serif;
  --font-mono: ui-monospace, SFMono-Regular, 'SF Mono', Menlo, monospace;

  /* dark (default) — chrome is near-black, panels are cream */
  --bg:        #0C0B09;   /* --surface   */
  --bg2:       #161410;   /* --surface-2 */
  --bg3:       #1E1C18;   /* --surface-3 */
  --border:    #2A2824;
  --fg:        #F4EFE3;
  --fg-muted:  #8A8480;
  --fg-faint:  #4A463F;
  --fg-quote:  #B0A898;
  --ok:        #7A8A6A;

  /* cream — panel surfaces */
  --panel-bg:   #F4EFE3;  /* --cream   */
  --panel-bg2:  #EAE4D6;  /* --cream-2 */
  --panel-fg:   #1A1714;  /* --ink     */
  --panel-fg2:  #3A3530;  /* --ink-2   */
  --panel-mut:  #7A756E;
  --panel-line: #EAE4D6;

  /* radii */
  --r-panel: 12px;
  --r-input: 14px;
  --r-pill:  20px;
  --r-btn:   8px;
  --r-card:  10px;

  --hair: 0.5px solid var(--border);
}

[data-theme="light"] {
  --bg:        #F4EFE3;
  --bg2:       #EAE4D6;
  --bg3:       #DDD8CC;
  --border:    #C8C2B4;
  --fg:        #1A1714;
  --fg-muted:  #7A756E;
  --fg-faint:  #A39E94;
  --fg-quote:  #6E685E;
  --ok:        #4F6B40;

  --panel-bg:   #0C0B09;
  --panel-bg2:  #161410;
  --panel-fg:   #F4EFE3;
  --panel-fg2:  #D8D2C4;
  --panel-mut:  #8A847A;
  --panel-line: #2A2824;
}

/* ── reset + base ──────────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; }
html, body { height: 100%; margin: 0; }
body {
  background: var(--bg);
  color: var(--fg);
  font-family: var(--font);
  font-size: 13px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
  overflow: hidden;
  letter-spacing: -0.1px;
}
button { font: inherit; color: inherit; background: none; border: none; padding: 0; cursor: pointer; }
input, textarea, select { font: inherit; color: inherit; }
input::placeholder, textarea::placeholder { color: var(--fg-faint); }
::selection { background: rgba(244,239,227,.18); color: var(--fg); }
[data-theme="light"] ::selection { background: rgba(26,23,20,.16); color: var(--fg); }
.panel ::selection { background: rgba(26,23,20,.16); color: var(--panel-fg); }
[data-theme="light"] .panel ::selection { background: rgba(244,239,227,.18); color: var(--panel-fg); }

/* ── app shell ─────────────────────────────────────────────────────── */
.app {
  display: grid;
  grid-template-columns: var(--sb-w, 220px) 1fr var(--nt-w, 0px);
  height: 100vh;
  transition: grid-template-columns .2s ease;
}
.app[data-sb="true"]  { --sb-w: 52px; }
.app[data-nt="true"]  { --nt-w: 280px; }

/* ══════════════════════ SIDEBAR ══════════════════════════════════════ */
.sidebar {
  background: var(--bg2);
  border-right: var(--hair);
  display: flex; flex-direction: column;
  min-width: 0; overflow: hidden;
  z-index: 30;
}

.sb-brand {
  display: flex; align-items: center; gap: 10px;
  padding: 14px 14px;
  border-bottom: var(--hair);
  min-height: 48px;
  white-space: nowrap;
}
.sb-mark {
  flex: 0 0 16px; width: 16px; height: 16px;
  position: relative;
  display: flex; align-items: center; justify-content: center;
}
.sb-mark .dot {
  width: 5px; height: 5px; border-radius: 50%;
  background: var(--fg);
  position: relative; z-index: 1;
}
.sb-mark .ring {
  position: absolute; inset: 0;
  border: 0.5px solid var(--fg-muted);
  border-radius: 50%; opacity: .4;
}
.sb-name {
  font-size: 13px; font-weight: 500;
  color: var(--fg); letter-spacing: -0.4px;
  transition: opacity .15s;
}

/* collapse hides text labels */
.app[data-sb="true"] .sb-name,
.app[data-sb="true"] .sb-row-lbl,
.app[data-sb="true"] .sb-meta,
.app[data-sb="true"] .sb-section-lbl,
.app[data-sb="true"] .sb-history-wrap { opacity: 0; pointer-events: none; }

/* nav */
.sb-nav {
  padding: 8px 8px 10px;
  border-bottom: var(--hair);
  display: flex; flex-direction: column; gap: 1px;
}
.sb-row {
  display: flex; align-items: center; gap: 10px;
  padding: 0 10px; height: 34px;
  border-radius: 7px;
  color: var(--fg-muted); cursor: pointer;
  white-space: nowrap;
  transition: background .12s, color .12s;
}
.app[data-sb="true"] .sb-row { justify-content: center; padding: 0; }
.sb-row .ic {
  flex: 0 0 16px; width: 16px; height: 16px;
  display: flex; align-items: center; justify-content: center;
}
.sb-row .ic svg { stroke: currentColor; fill: none; stroke-width: 1; }
.sb-row-lbl { font-size: 12px; font-weight: 500; letter-spacing: -0.1px; }
.sb-row:hover { background: var(--bg3); color: var(--fg); }
.sb-row[data-active="true"] { background: var(--fg); color: var(--bg); }

/* sessions header */
.sb-sessions-hd {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 14px 6px;
}
.sb-sessions-hd span {
  font-size: 9px; font-weight: 500;
  color: var(--fg-faint); letter-spacing: 0.6px; text-transform: uppercase;
}
.sb-sessions-hd button {
  color: var(--fg-muted); padding: 3px;
  border-radius: 4px; display: inline-flex;
  transition: color .12s, background .12s;
}
.sb-sessions-hd button:hover { background: var(--bg3); color: var(--fg); }

/* history */
.sb-history-wrap {
  flex: 1; overflow-y: auto;
  padding: 2px 8px 10px;
  scrollbar-width: none; min-height: 0;
}
.sb-history-wrap::-webkit-scrollbar { display: none; }
.sb-group-lbl {
  font-size: 9px; font-weight: 500;
  color: var(--fg-faint); letter-spacing: 0.6px; text-transform: uppercase;
  padding: 10px 5px 4px;
}
.sb-group-lbl:first-child { padding-top: 4px; }
.sb-item {
  padding: 7px 9px; border-radius: 6px;
  cursor: pointer; margin-bottom: 1px;
  transition: background .12s;
}
.sb-item:hover { background: var(--bg3); }
.sb-item-title {
  font-size: 11.5px; color: var(--fg);
  letter-spacing: -0.1px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  margin-bottom: 2px;
}
.sb-meta {
  font-size: 10px; color: var(--fg-faint);
  letter-spacing: 0.1px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}

/* spacer when collapsed */
.sb-flex-1 { flex: 1; }

/* footer */
.sb-foot {
  padding: 8px;
  border-top: var(--hair);
  display: flex; flex-direction: column; gap: 1px;
}
.sb-foot .sb-row { height: 32px; }

/* ══════════════════════ MAIN ═════════════════════════════════════════ */
.main {
  display: flex; flex-direction: column;
  min-width: 0; min-height: 0; position: relative;
}

.topbar {
  height: 48px; flex: 0 0 48px;
  background: var(--bg2); border-bottom: var(--hair);
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 16px; z-index: 5;
}
.tb-mode {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 4px 10px;
  background: var(--bg3); border: var(--hair);
  border-radius: var(--r-pill);
  color: var(--fg-muted);
  font-size: 10px; font-weight: 500;
  letter-spacing: 0.5px; text-transform: uppercase;
  transition: background .12s, color .12s;
}
.tb-mode:hover, .tb-mode[data-open="true"] {
  background: var(--fg); color: var(--bg); border-color: transparent;
}
.tb-slash { opacity: .55; }

.tb-right { display: flex; align-items: center; gap: 8px; }
.tb-status {
  font-size: 10px; color: var(--fg-faint);
  letter-spacing: 0.2px; margin-right: 6px;
}
.tb-density { display: inline-flex; gap: 4px; }
.tb-density button {
  font-size: 11px; font-weight: 500;
  padding: 4px 11px; border-radius: 6px;
  background: var(--bg3); border: var(--hair);
  color: var(--fg-muted);
  letter-spacing: 0.1px;
  transition: background .12s, color .12s;
}
.tb-density button:hover { color: var(--fg); }
.tb-density button[data-active="true"] {
  background: var(--fg); color: var(--bg); border-color: transparent;
}

/* ── screens ───────────────────────────────────────────────────────── */
.screens {
  flex: 1; min-height: 0; position: relative;
}
.screen {
  position: absolute; inset: 0;
  overflow-y: auto; display: none;
}
.screen[data-active="true"] { display: block; }
.screen-inner {
  max-width: 1180px; margin: 0 auto;
  padding: 14px 16px 0;
}
.screen[data-id="arena"]   .screen-inner { padding-bottom: 200px; }
.screen[data-id="library"] .screen-inner,
.screen[data-id="config"]  .screen-inner {
  padding: 36px 28px 80px; max-width: 960px;
}

/* ── screen common header ───────────────────────────────────────────── */
.screen-head { margin-bottom: 28px; }
.screen-overline {
  font-size: 9px; font-weight: 500;
  color: var(--fg-faint); letter-spacing: 0.6px; text-transform: uppercase;
  margin-bottom: 12px;
}
.screen-title {
  margin: 0 0 8px; font-size: 28px; font-weight: 500;
  color: var(--fg); letter-spacing: -0.6px;
}
.screen-sub {
  margin: 0; font-size: 13px; color: var(--fg-muted);
  letter-spacing: -0.1px; line-height: 1.6;
}

/* ══════════════════════ ARENA ════════════════════════════════════════ */
.query-bubble {
  background: var(--bg2); border: var(--hair);
  border-radius: var(--r-card);
  padding: 11px 16px; margin-bottom: 14px;
  font-size: 13px; color: var(--fg-quote);
  line-height: 1.5; letter-spacing: -0.1px;
}

/* grid */
.grid { display: grid; gap: 8px; margin-bottom: 8px; }
.grid[data-density="2"] { grid-template-columns: 1fr 1fr; }
.grid[data-density="4"] { grid-template-columns: 1fr 1fr; }
.grid[data-density="8"] { grid-template-columns: 1fr 1fr; }
.grid[data-density="2"] .panel:nth-child(n+3),
.grid[data-density="4"] .panel:nth-child(n+5) { display: none; }

/* ── response panel ─────────────────────────────────────────────────── */
.panel {
  background: var(--panel-bg);
  border-radius: var(--r-panel);
  padding: 13px 15px;
  min-height: 116px;
  display: flex; flex-direction: column;
  animation: panelIn .42s cubic-bezier(.2,.6,.2,1) both;
}
@keyframes panelIn {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: translateY(0); }
}

.p-head {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 9px;
}
.p-head.is-processing { margin-bottom: 16px; }

.p-name { display: flex; align-items: center; gap: 7px; }
.p-dot {
  width: 5px; height: 5px; border-radius: 50%;
  background: var(--panel-fg); flex-shrink: 0;
}
.p-label {
  font-size: 10px; font-weight: 500;
  color: var(--panel-fg2);
  text-transform: uppercase; letter-spacing: 0.5px;
}
.p-status {
  font-size: 9px; color: var(--panel-mut);
  letter-spacing: 0.2px;
}
.p-status[data-state="done"] { color: var(--ok); }
[data-theme="light"] .p-status[data-state="done"] { color: var(--ok); }

.p-body {
  font-size: 12px; color: var(--panel-fg2);
  line-height: 1.65; letter-spacing: -0.1px;
  flex: 1; white-space: pre-wrap; word-break: break-word;
  overflow-y: auto; padding-right: 2px;
}
.p-cursor {
  display: inline-block;
  width: 1.5px; height: 11px;
  background: var(--panel-fg2);
  vertical-align: -1px; margin-left: 1px;
  animation: blink 1s step-end infinite;
}
@keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0; } }

.p-dots { display: flex; align-items: center; gap: 6px; padding: 4px 0; }
.p-dots .d {
  width: 5px; height: 5px; border-radius: 50%;
  background: var(--panel-fg);
  animation: dotpulse 1.5s ease-in-out infinite;
}
@keyframes dotpulse {
  0%,60%,100% { transform: scale(1); opacity: .25; }
  30%          { transform: scale(1.5); opacity: .9; }
}

.p-foot {
  display: flex; gap: 14px;
  border-top: 0.5px solid var(--panel-line);
  padding-top: 8px; margin-top: 9px;
}
.p-foot button {
  font-size: 10px; color: var(--panel-mut);
  letter-spacing: 0.1px;
  transition: color .12s;
}
.p-foot button:hover { color: var(--panel-fg); }

/* ── synthesis ──────────────────────────────────────────────────────── */
.synth {
  margin-bottom: 14px;
  background: var(--panel-bg);
  border-radius: var(--r-panel);
  padding: 20px 22px 0;
  animation: panelIn .5s cubic-bezier(.2,.7,.2,1) both;
}
.synth-head {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 18px; flex-wrap: wrap; gap: 10px;
}
.synth-title { display: flex; align-items: center; gap: 10px; }
.synth-lbl {
  font-size: 14px; font-weight: 500;
  color: var(--panel-fg); letter-spacing: -0.4px;
}
.synth-badge {
  font-size: 9px; font-weight: 500;
  padding: 3px 8px;
  background: var(--panel-bg2); border-radius: var(--r-pill);
  color: var(--panel-fg2);
  letter-spacing: 0.5px; text-transform: uppercase;
}
.synth-meta {
  font-size: 9px; color: var(--panel-fg2);
  letter-spacing: 0.4px; text-transform: uppercase;
  font-weight: 500; opacity: .55;
}
.synth-block {
  display: grid; grid-template-columns: 110px 1fr;
  gap: 20px; padding: 14px 0;
  border-top: 0.5px solid var(--panel-line);
}
.synth-block:first-of-type { border-top: none; }
.synth-block-label {
  font-size: 9px; font-weight: 500;
  color: var(--panel-fg2); opacity: .55;
  text-transform: uppercase; letter-spacing: 0.6px;
  padding-top: 3px;
}
.synth-block-body {
  margin: 0; font-size: 13.5px; line-height: 1.7;
  color: var(--panel-fg2); letter-spacing: -0.15px;
}
.synth-foot {
  display: flex; gap: 14px; align-items: center;
  border-top: 0.5px solid var(--panel-line);
  padding: 14px 0 16px; margin-top: 6px;
  flex-wrap: wrap;
}
.synth-foot-lbl {
  font-size: 10px; color: var(--panel-fg2); opacity: .55;
  letter-spacing: 0.4px; text-transform: uppercase; font-weight: 500;
}
.synth-exp {
  font-size: 11px; font-weight: 500;
  color: var(--panel-fg2); cursor: pointer; letter-spacing: 0.2px;
  transition: opacity .12s;
}
.synth-exp:hover { opacity: .6; }
.synth-save {
  margin-left: auto;
  background: transparent; color: var(--panel-fg);
  border: 0.5px solid var(--panel-fg2);
  font-size: 12px; font-weight: 500;
  padding: 7px 16px; border-radius: var(--r-btn);
  cursor: pointer; letter-spacing: -0.1px;
  transition: opacity .12s, transform .06s;
}
.synth-save:hover { opacity: .75; }
.synth-save:active { transform: scale(.97); }

/* ══════════════════════ INPUT BAR ════════════════════════════════════ */
.input-fade {
  position: absolute; left: 0; right: 0; bottom: 88px;
  height: 32px;
  background: linear-gradient(to bottom, transparent, var(--bg));
  pointer-events: none; z-index: 8;
}
.input-bar {
  position: absolute; left: 0; right: 0; bottom: 0;
  padding: 10px 16px 18px; z-index: 9;
}
.input-card {
  max-width: 1180px; margin: 0 auto;
  background: var(--bg2); border: var(--hair);
  border-radius: var(--r-input);
  padding: 12px 14px;
}
.chips {
  display: flex; gap: 6px; flex-wrap: wrap;
  margin-bottom: 11px;
}
.chip {
  font-size: 11px; padding: 5px 12px;
  background: var(--bg3); border: var(--hair);
  border-radius: var(--r-pill);
  color: var(--fg-muted); white-space: nowrap; cursor: pointer;
  letter-spacing: -0.05px;
  transition: color .12s, background .15s;
}
.chip:hover { background: #252320; color: var(--fg); }
[data-theme="light"] .chip:hover { background: var(--bg2); color: var(--fg); }

.in-row { display: flex; align-items: center; gap: 10px; }
.in-pipe {
  font-size: 14px; color: var(--fg-faint);
  flex: 0 0 auto; user-select: none; opacity: .6;
}
.in-field {
  flex: 1; background: transparent; border: none; outline: none;
  color: var(--fg); font-size: 13px; letter-spacing: -0.1px;
}
.in-send {
  background: var(--fg); color: var(--bg);
  font-size: 12px; font-weight: 500;
  padding: 7px 16px; border-radius: var(--r-btn);
  letter-spacing: -0.1px; flex: 0 0 auto;
  transition: opacity .12s, transform .06s;
}
.in-send:hover { opacity: .88; transform: scale(.97); }
.in-send[disabled] {
  background: var(--bg3); color: var(--fg-muted);
  opacity: 1; cursor: default; transform: none;
}

/* ══════════════════════ MODE POPOVER ═════════════════════════════════ */
.pop-overlay {
  position: fixed; inset: 0; z-index: 50;
  background: rgba(12,11,9,.55);
  backdrop-filter: blur(2px);
  -webkit-backdrop-filter: blur(2px);
}
.pop-overlay[hidden] { display: none; }
.popover {
  position: fixed; z-index: 51;
  background: var(--bg2); border: var(--hair);
  border-radius: 12px; padding: 6px;
  min-width: 300px;
  animation: popIn .18s ease-out both;
}
@keyframes popIn {
  from { opacity: 0; transform: scale(.985) translateY(-4px); }
  to   { opacity: 1; transform: scale(1)    translateY(0);   }
}
.pop-hd {
  padding: 8px 10px 6px;
  font-size: 9px; font-weight: 500;
  color: var(--fg-faint); letter-spacing: 0.6px; text-transform: uppercase;
}
.pop-opt {
  padding: 9px 10px; border-radius: 8px;
  cursor: pointer; margin-bottom: 1px;
  transition: background .1s;
}
.pop-opt:hover { background: var(--bg3); }
.pop-opt[data-active="true"] { background: var(--fg); }
.pop-opt[data-active="true"] .pop-name { color: var(--bg); }
.pop-opt[data-active="true"] .pop-hint,
.pop-opt[data-active="true"] .pop-desc { color: var(--bg); opacity: .55; }
.pop-name-row {
  display: flex; align-items: baseline; justify-content: space-between;
  margin-bottom: 3px;
}
.pop-name {
  font-size: 12px; font-weight: 500;
  color: var(--fg); letter-spacing: -0.2px;
}
.pop-hint {
  font-size: 9px; color: var(--fg-muted);
  letter-spacing: 0.4px; text-transform: uppercase;
}
.pop-desc {
  font-size: 11px; color: var(--fg-muted);
  letter-spacing: -0.05px; line-height: 1.4;
}

/* ══════════════════════ NOTES ════════════════════════════════════════ */
.notes-toggle {
  position: fixed; right: 18px; top: 18px;
  width: 36px; height: 36px; border-radius: 50%;
  background: var(--bg2); border: var(--hair);
  color: var(--fg-muted);
  display: flex; align-items: center; justify-content: center;
  z-index: 25;
  transition: background .12s, color .12s, opacity .2s;
}
.notes-toggle:hover { background: var(--bg3); color: var(--fg); }
.app[data-nt="true"] .notes-toggle { opacity: 0; pointer-events: none; }

.notes-panel {
  background: var(--bg2); border-left: var(--hair);
  display: flex; flex-direction: column;
  overflow: hidden; min-width: 0;
}
.notes-head {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 14px 10px;
  border-bottom: var(--hair); min-height: 48px;
}
.notes-title { font-size: 13px; font-weight: 500; color: var(--fg); letter-spacing: -0.3px; }
.notes-close {
  width: 24px; height: 24px; font-size: 16px; line-height: 1;
  color: var(--fg-muted); border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
  transition: background .12s, color .12s;
}
.notes-close:hover { background: var(--bg3); color: var(--fg); }
.notes-body {
  flex: 1; background: transparent; border: none; outline: none; resize: none;
  padding: 14px 16px; color: var(--fg); font-family: var(--font);
  font-size: 12px; line-height: 1.7; letter-spacing: -0.1px;
}
.notes-foot {
  padding: 9px 16px; border-top: var(--hair);
  font-size: 10px; color: var(--fg-faint); letter-spacing: 0.1px;
}

/* ══════════════════════ BIBLIOTECA ═══════════════════════════════════ */
.lib-bar {
  display: flex; align-items: center; gap: 10px;
  margin-bottom: 18px; flex-wrap: wrap;
}
.lib-search {
  flex: 1 1 260px;
  background: var(--bg2); border: var(--hair);
  border-radius: var(--r-card);
  padding: 8px 14px;
  display: flex; align-items: center; gap: 8px;
}
.lib-search input {
  flex: 1; background: transparent; border: none; outline: none;
  color: var(--fg); font-size: 12.5px; letter-spacing: -0.1px;
}
.lib-filters { display: flex; gap: 4px; flex-wrap: wrap; }
.lib-filters button {
  font-size: 10.5px; font-weight: 500;
  padding: 6px 11px;
  background: var(--bg2); border: var(--hair);
  border-radius: var(--r-pill);
  color: var(--fg-muted); letter-spacing: 0.1px;
  transition: background .12s, color .12s;
}
.lib-filters button:hover { color: var(--fg); }
.lib-filters button[data-active="true"] {
  background: var(--fg); color: var(--bg); border-color: transparent;
}

.lib-list {
  background: var(--bg2); border: var(--hair);
  border-radius: 12px; overflow: hidden;
}
.lib-item {
  display: grid; grid-template-columns: 1fr auto;
  gap: 12px; align-items: start;
  padding: 16px 18px;
  border-top: var(--hair); cursor: pointer;
  transition: background .12s;
}
.lib-item:first-child { border-top: none; }
.lib-item:hover { background: var(--bg3); }
.lib-item-title {
  font-size: 13px; font-weight: 500;
  color: var(--fg); letter-spacing: -0.3px; margin-bottom: 4px;
}
.lib-item-preview {
  font-size: 11.5px; color: var(--fg-muted);
  letter-spacing: -0.1px; line-height: 1.55;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.lib-item-meta {
  display: flex; flex-direction: column;
  align-items: flex-end; gap: 6px; flex-shrink: 0;
  font-size: 9px; font-weight: 500;
  letter-spacing: 0.4px; text-transform: uppercase;
}
.lib-item-when { color: var(--fg-faint); }
.lib-item-mode { color: var(--fg-muted); }
.lib-empty {
  padding: 48px 20px; text-align: center;
  font-size: 12px; color: var(--fg-faint);
}

/* ══════════════════════ CONFIGURAÇÃO ═════════════════════════════════ */
.cfg-section { margin-bottom: 28px; }
.cfg-section-lbl {
  font-size: 9px; font-weight: 500;
  color: var(--fg-faint); letter-spacing: 0.6px; text-transform: uppercase;
  margin-bottom: 12px;
}
.cfg-card {
  background: var(--bg2); border: var(--hair);
  border-radius: 12px; overflow: hidden;
}
.cfg-row {
  padding: 14px 18px;
  border-bottom: var(--hair);
  display: grid; grid-template-columns: 1fr auto;
  gap: 16px; align-items: center;
}
.cfg-row:last-child { border-bottom: none; }
.cfg-row-label {
  font-size: 12.5px; font-weight: 500;
  color: var(--fg); letter-spacing: -0.2px; margin-bottom: 2px;
}
.cfg-row-hint {
  font-size: 11px; color: var(--fg-muted);
  letter-spacing: -0.1px; line-height: 1.5;
}
.api-field { display: flex; align-items: center; gap: 8px; }
.api-field input {
  width: 190px;
  background: var(--bg3); border: var(--hair);
  border-radius: 8px; padding: 7px 12px;
  color: var(--fg);
  font-family: var(--font-mono); font-size: 11.5px; outline: none;
}
.api-status {
  font-size: 9px; font-weight: 500;
  letter-spacing: 0.5px; text-transform: uppercase; white-space: nowrap;
}
.api-status[data-on="true"]  { color: var(--fg); }
.api-status[data-on="false"] { color: var(--fg-faint); opacity: .6; }

}
.cfg-toggle {
  width: 36px; height: 20px; border-radius: 12px;
  background: var(--bg3); border: var(--hair);
  position: relative; cursor: pointer; padding: 0;
  transition: background .15s, border-color .15s;
}
.cfg-toggle[data-on="true"] { background: var(--fg); border-color: transparent; }
.cfg-toggle .thumb {
  position: absolute; top: 2px; left: 2px;
  width: 14px; height: 14px; border-radius: 50%;
  background: var(--fg-muted);
  transition: left .15s, background .15s;
}
.cfg-toggle[data-on="true"] .thumb { left: 18px; background: var(--bg); }

kbd.cfg-kbd {

  border-radius: 5px; padding: 4px 8px;
  font-size: 11px; color: var(--fg-muted);

}

/* ── misc ───────────────────────────────────────────────────────────── */
:focus-visible { outline: 1px solid var(--fg-muted); outline-offset: 2px; border-radius: 4px; }
input:focus-visible, textarea:focus-visible, select:focus-visible { outline-offset: 0; }

<script>
// ══════════════════════════════════════════════════════════════════════
// HYDRA LABS — vanilla controller
// ══════════════════════════════════════════════════════════════════════

// ── data ───────────────────────────────────────────────────────────────

const MODELS = [
  { id: 'claude',     name: 'Claude',     dot: '0s'    },
  { id: 'grok',       name: 'Grok',       dot: '0.04s' },
  { id: 'chatgpt',    name: 'ChatGPT',    dot: '0.06s' },
  { id: 'gemini',     name: 'Gemini',     dot: '0.1s'  },
  { id: 'perplexity', name: 'Perplexity', dot: '0.08s' },
  { id: 'deepseek',   name: 'DeepSeek',   dot: '0.13s' },
  { id: 'mistral',    name: 'Mistral',    dot: '0.09s' },
  { id: 'cohere',     name: 'Cohere',     dot: '0.05s' },
];

const DEFAULT_QUERY = 'Qual o impacto das redes de influência nos sistemas democráticos modernos?';

const RESPONSES = {
  claude:
    'As redes de influência operam por captura institucional, manufactura de consenso e erosão epistémica. O efeito não é um colapso visível, mas uma deriva — a janela de Overton desloca-se sem que ninguém pareça responsável. A democracia formal sobrevive; a deliberação substantiva atrofia.',
  grok:
    'Democracia é uma ficção útil. O que existe são oligarquias com eleições periódicas. As redes não corrompem o sistema — elas são o sistema. Quem o nega ou é ingénuo, ou faz parte da rede.',
  chatgpt:
    'Três dimensões importam: concentração financeira, amplificação algorítmica e captura regulatória. A literatura empírica sugere que partidos com >40% de financiamento concentrado adoptam políticas significativamente desviadas da mediana do eleitor.',
  gemini:
    'Há um trade-off mensurável entre velocidade de circulação informacional e qualidade deliberativa. As redes aceleram o ciclo de feedback ao ponto de tornar a reflexão pública estruturalmente impossível. O problema é cinético, não moral.',
  perplexity:
    'Estudos do Pew (2024) e do Reuters Institute mostram que 63% dos cidadãos em democracias OECD identificam redes informais como "mais influentes que o voto". A erosão da confiança institucional precede — não segue — a polarização.',
  deepseek:
    'Modelando como rede dirigida com pesos de capital social, o equilíbrio estável favorece nós com alta centralidade de intermediação. O voto é ruído de baixa amplitude sobreposto a um sinal de coordenação oligárquica.',
  mistral:
    'A questão é mal-posta. Não há sistema democrático "puro" a ser corrompido — todas as democracias históricas foram redes de influência sobrepostas a procedimentos formais. A diferença actual é a escala e a opacidade.',
  cohere:
    'Operacionalmente: três mecanismos — lobbying directo, pré-compromisso de elites, e moldagem da agenda mediática. O terceiro é o mais consequente porque opera antes de qualquer decisão explícita ser tomada.',
};

const SUGGESTIONS = [
  'Teoria dos jogos',
  'Poder e instituições',
  'Psicologia da manipulação',
  'Sistemas complexos',
];

const MODES = [
  { id: 'rapido',       label: 'Rápido',       desc: 'Resposta directa. Máximo 150 palavras.',    hint: 'baixa latência' },
  { id: 'raciocinio',   label: 'Raciocínio',   desc: 'Cadeia de pensamento. Respostas exaustivas.', hint: 'pensa antes' },
  { id: 'pesquisa',     label: 'Pesquisa',     desc: 'Grounding factual. Fontes priorizadas.',     hint: 'web · papers' },
  { id: 'investigacao', label: 'Investigação', desc: 'Análise profunda. Pressupostos mapeados.',   hint: 'profundo'     },
];

const SYNTHESIS = [
  { label: 'CONSENSO',
    body: 'As oito vozes convergem: as redes de influência não são um defeito periférico do sistema democrático — são parte da sua estrutura operacional. A questão deixou de ser "se" e passou a ser "como" e "com que magnitude". Captura institucional, amplificação algorítmica e concentração financeira aparecem repetidos em pelo menos cinco respostas independentes.' },
  { label: 'DIVERGÊNCIA',
    body: 'Grok e Mistral pressionam para uma posição cínica — a democracia "pura" como ficção retórica. Claude, Gemini e Cohere mantêm uma análise clínica, identificando os mesmos fenómenos sem recurso ao desespero. ChatGPT e DeepSeek tratam o problema como mensurável; Perplexity ancora em estudos empíricos. A divergência é tonal, não substantiva.' },
  { label: 'INSIGHT',
    body: 'Nenhum dos oito modelos abordou contra-mecanismos viáveis: jornalismo investigativo, conselhos cidadãos, transparência radical de financiamento. A análise é unanimemente diagnóstica, raramente prescritiva — uma assimetria que vale a pena interrogar na próxima iteração.' },
];

const SESSIONS = [
  { title: 'Redes de influência democrática',     when: 'hoje 14:32',  group: 'hoje',   mode: '/Raciocínio',   voices: 8, preview: 'Qual o impacto das redes de influência nos sistemas democráticos modernos?' },
  { title: 'Teoria dos jogos aplicada',           when: 'hoje 11:07',  group: 'hoje',   mode: '/Investigação', voices: 8, preview: 'Como modelar coligações instáveis em equilíbrios não-cooperativos repetidos?' },
  { title: 'Psicologia da manipulação',           when: 'ontem 22:14', group: 'ontem',  mode: '/Pesquisa',     voices: 4, preview: 'Quais os mecanismos cognitivos explorados em campanhas de desinformação?' },
  { title: 'Sistemas complexos e caos',           when: 'ontem 18:43', group: 'ontem',  mode: '/Raciocínio',   voices: 8, preview: 'Onde está a fronteira entre comportamento caótico e meramente complexo?' },
  { title: 'Poder e arquitectura institucional',  when: 'ontem 09:21', group: 'ontem',  mode: '/Investigação', voices: 8, preview: 'Que arranjos institucionais resistem melhor a captura por elites?' },
  { title: 'Filosofia da mente e consciência',    when: 'seg 20:11',   group: 'semana', mode: '/Raciocínio',   voices: 8, preview: 'A consciência é um fenómeno computacional ou irredutivelmente físico?' },
  { title: 'Geopolítica do Indo-Pacífico',        when: 'seg 15:38',   group: 'semana', mode: '/Pesquisa',     voices: 8, preview: 'Que cenários de confrontação Taiwan-China são plausíveis até 2030?' },
  { title: 'Epistemologia e certeza',             when: 'dom 11:02',   group: 'semana', mode: '/Investigação', voices: 4, preview: 'Quão justificada pode ser uma crença sem critério externo de validação?' },
  { title: 'Linguagem e poder simbólico',         when: 'sáb 17:55',   group: 'semana', mode: '/Rápido',       voices: 2, preview: 'Como Bourdieu conceptualiza a violência simbólica em práticas linguísticas?' },
];

// ── state ───────────────────────────────────────────────────────────────

const state = {
  view:        'arena',
  theme:       'dark',
  collapsed:   false,
  notesOpen:   false,
  mode:        'raciocinio',
  density:     8,
  query:       DEFAULT_QUERY,
  panels:      [],
  running:     false,
  streamSpeed: 18,
  libFilter:   'all',
  libQuery:    '',
};

// initial scenario: 1 streaming, 1 done, rest processing
state.panels = MODELS.map((m, i) => ({
  id:     m.id,
  name:   m.name,
  status: i === 0 ? 'streaming' : i === 1 ? 'done' : 'processing',
  text:   i === 0 ? RESPONSES[m.id].slice(0, 96) : i === 1 ? RESPONSES[m.id] : '',
}));

const timers = [];
function clearTimers() { while (timers.length) clearTimeout(timers.pop()); }

// ── DOM helpers ─────────────────────────────────────────────────────────

const $  = (s, r = document) => r.querySelector(s);
const $$ = (s, r = document) => [...r.querySelectorAll(s)];

function el(tag, attrs = {}, ...children) {
  const e = document.createElement(tag);
  for (const [k, v] of Object.entries(attrs)) {
    if (k === 'class') e.className = v;
    else if (k === 'html')  e.innerHTML = v;
    else if (k.startsWith('on') && typeof v === 'function') e.addEventListener(k.slice(2), v);
    else if (v !== false && v != null) e.setAttribute(k, v);
  }
  for (const c of children.flat()) {
    if (c == null || c === false) continue;
    e.append(c?.nodeType ? c : document.createTextNode(c));
  }
  return e;
}

// ── sidebar history ─────────────────────────────────────────────────────

function renderHistory() {
  const root = $('#sb-history');
  root.innerHTML = '';
  const groups = [
    { key: 'hoje',   label: 'Hoje' },
    { key: 'ontem',  label: 'Ontem' },
    { key: 'semana', label: 'Esta semana' },
  ];
  for (const g of groups) {
    const items = SESSIONS.filter(s => s.group === g.key);
    if (!items.length) continue;
    root.append(el('div', { class: 'sb-group-lbl' }, g.label));
    for (const s of items) {
      root.append(
        el('div', { class: 'sb-item', title: s.title, onclick: () => goto('arena') },
          el('div', { class: 'sb-item-title' }, s.title),
          el('div', { class: 'sb-meta' }, `${s.mode} · ${s.voices} vozes`),
        )
      );
    }
  }
}

// ── chips ───────────────────────────────────────────────────────────────

function renderChips() {
  const root = $('#chips');
  root.innerHTML = '';
  for (const s of SUGGESTIONS) {
    root.append(el('button', { class: 'chip', onclick: () => {
      const f = $('#in-field');
      f.value = f.value ? `${f.value} · ${s}` : s;
      f.focus();
      syncSendBtn();
    }}, s));
  }
}

// ── arena grid ──────────────────────────────────────────────────────────

function renderGrid() {
  const grid = $('#grid');
  grid.dataset.density = state.density;
  grid.innerHTML = '';

  state.panels.forEach((p, i) => {
    const m = MODELS[i];
    const isProc = p.status === 'processing';
    const isStream = p.status === 'streaming';
    const isDone = p.status === 'done';

    const head = el('div', { class: `p-head${isProc ? ' is-processing' : ''}` },
      el('div', { class: 'p-name' },
        el('span', { class: 'p-dot' }),
        el('span', { class: 'p-label' }, p.name),
      ),
      !isProc
        ? el('span', { class: 'p-status', 'data-state': p.status },
            isStream ? 'streaming' : 'concluído')
        : null,
    );

    let body;
    if (isProc) {
      const d = m.dot;
      body = el('div', { class: 'p-dots' },
        el('span', { class: 'd', style: `animation-delay:${d}` }),
        el('span', { class: 'd', style: `animation-delay:calc(${d} + .18s)` }),
        el('span', { class: 'd', style: `animation-delay:calc(${d} + .36s)` }),
      );
    } else if (isStream) {
      body = el('div', { class: 'p-body' });
      body.textContent = p.text;
      body.append(el('span', { class: 'p-cursor' }));
    } else {
      body = el('div', { class: 'p-body' }, p.text);
    }

    const parts = [head, body];
    if (isDone) {
      parts.push(
        el('div', { class: 'p-foot' },
          el('button', {}, 'copiar'),
          el('button', {}, 'repetir'),
          el('button', {}, 'baixar'),
        )
      );
    }

    grid.append(
      el('div', { class: 'panel', style: `animation-delay:${i * 40}ms` }, ...parts)
    );
  });

  const proc = state.panels.filter(p => p.status !== 'done').length;
  const done = state.panels.filter(p => p.status === 'done').length;
  $('#tb-status').textContent = proc > 0
    ? `${proc} a processar · ${done} concluídas`
    : `${done} concluídas`;
}

// ── synthesis ───────────────────────────────────────────────────────────

function renderSynth() {
  const mount = $('#synth-mount');
  mount.innerHTML = '';
  const allDone = state.panels.length > 0 && state.panels.every(p => p.status === 'done');
  if (!allDone) return;

  const head = el('div', { class: 'synth-head' },
    el('div', { class: 'synth-title' },
      el('span', { class: 'p-dot' }),
      el('span', { class: 'synth-lbl' }, 'Síntese'),
      el('span', { class: 'synth-badge' }, 'gerado por Claude'),
    ),
    el('span', { class: 'synth-meta' }, '1.2s · 8/8 fontes'),
  );

  const blocks = SYNTHESIS.map(b =>
    el('div', { class: 'synth-block' },
      el('div', { class: 'synth-block-label' }, b.label),
      el('p',   { class: 'synth-block-body'  }, b.body),
    )
  );

  const foot = el('div', { class: 'synth-foot' },
    el('span', { class: 'synth-foot-lbl' }, 'Exportar'),
    ...['MD', 'EPUB', 'JSON'].map(f => el('button', { class: 'synth-exp' }, f)),
    el('button', { class: 'synth-save' }, 'Guardar sessão'),
  );

  mount.append(el('div', { class: 'synth' }, head, ...blocks, foot));
}

// ── arena ───────────────────────────────────────────────────────────────

function renderArena() {
  $('#query-bubble').textContent = `"${state.query}"`;
  renderGrid();
  renderSynth();
}

// ── library ─────────────────────────────────────────────────────────────

function renderLibrary() {
  const list = $('#lib-list');
  list.innerHTML = '';

  const q = state.libQuery.toLowerCase();
  const filtered = SESSIONS.filter(s =>
    (state.libFilter === 'all' || s.mode === state.libFilter) &&
    (!q || (`${s.title} ${s.preview}`).toLowerCase().includes(q))
  );

  $('#lib-sub').textContent =
    `${SESSIONS.length} conversas guardadas — pesquisa, filtra por modo, ou abre para continuar.`;

  if (!filtered.length) {
    list.append(el('div', { class: 'lib-empty' }, 'Sem resultados.'));
    return;
  }
  for (const s of filtered) {
    list.append(
      el('div', { class: 'lib-item', onclick: () => goto('arena') },
        el('div', { style: 'min-width:0' },
          el('div', { class: 'lib-item-title' }, s.title),
          el('div', { class: 'lib-item-preview' }, s.preview),
        ),
        el('div', { class: 'lib-item-meta' },
          el('span', { class: 'lib-item-when' }, s.when),
          el('span', { class: 'lib-item-mode' }, `${s.mode} · ${s.voices} vozes`),
        ),
      )
    );
  }
}

// ── config ──────────────────────────────────────────────────────────────

function renderConfig() {
  const mount = $('#cfg-mount');
  mount.innerHTML = '';

  // API keys
  const providers = [
    { name: 'Anthropic',  on: true  },
    { name: 'OpenAI',     on: true  },
    { name: 'xAI',        on: true  },
    { name: 'Google',     on: true  },
    { name: 'Perplexity', on: true  },
    { name: 'DeepSeek',   on: false },
    { name: 'Mistral',    on: true  },
    { name: 'Cohere',     on: false },
  ];

  const apiSection = cfgSection('Vozes',
    ...providers.map(p =>
      cfgRow(p.name, null,
        el('div', { class: 'api-field' },
          el('input', { type: 'password', placeholder: p.on ? '••••••••••••••••' : 'sk-…' }),
          el('span', { class: 'api-status', 'data-on': String(p.on) },
            p.on ? '● ligado' : '○ por ligar'),
        )
      )
    )
  );

  // Behaviour
  let defaultMode = '/Raciocínio';
  let autoSynth   = true;
  let synthesizer = 'Claude';
  const behavSection = cfgSection('Comportamento',
    cfgRow('Modo por defeito', 'Aplicado a cada nova arena.',
      cfgSelect(['/Rápido', '/Raciocínio', '/Pesquisa', '/Investigação'], defaultMode,
        v => { defaultMode = v; })),
    cfgRow('Síntese automática', 'Gera síntese assim que as 8 vozes concluem.',
      cfgToggle(autoSynth, v => { autoSynth = v; })),
    cfgRow('Sintetizador', 'Voz responsável por unificar respostas.',
      cfgSelect(['Claude', 'Grok', 'ChatGPT', 'Gemini'], synthesizer,
        v => { synthesizer = v; })),
  );

  // Interface
  let lang    = 'Português';
  let haptics = false;
  const ifSection = cfgSection('Interface',
    cfgRow('Idioma', 'Aplica-se a UI e prompts internos.',
      cfgSelect(['Português', 'English', 'Español', 'Français'], lang,
        v => { lang = v; })),
    cfgRow('Vibração no streaming', 'Feedback subtil em dispositivos com háptica.',
      cfgToggle(haptics, v => { haptics = v; })),
  );

  // Shortcuts
  const shortcuts = [
    ['Nova arena',        '⌘ N'],
    ['Focar input',       '/'],
    ['Mudar de modo',     '⌘ K'],
    ['Abrir notas',       '⌘ ⇧ N'],
    ['Recolher sidebar',  '⌘ \\'],
  ];
  const kbdSection = cfgSection('Atalhos',
    ...shortcuts.map(([label, kbd]) =>
      cfgRow(label, null, el('kbd', { class: 'cfg-kbd' }, kbd))
    )
  );

  mount.append(apiSection, behavSection, ifSection, kbdSection);
}

function cfgSection(title, ...rows) {
  return el('div', { class: 'cfg-section' },
    el('div', { class: 'cfg-section-lbl' }, title),
    el('div', { class: 'cfg-card' }, ...rows),
  );
}
function cfgRow(label, hint, control) {
  return el('div', { class: 'cfg-row' },
    el('div', {},
      el('div', { class: 'cfg-row-label' }, label),
      hint ? el('div', { class: 'cfg-row-hint' }, hint) : null,
    ),
    el('div', {}, control),
  );
}
function cfgSelect(opts, val, onChange) {
  const s = el('select', { class: 'cfg-select' });
  for (const o of opts) {
    const opt = el('option', { value: o }, o);
    if (o === val) opt.selected = true;
    s.append(opt);
  }
  s.addEventListener('change', e => onChange(e.target.value));
  return s;
}
function cfgToggle(initial, onChange) {
  const btn = el('button', { class: 'cfg-toggle', 'data-on': String(initial) },
    el('span', { class: 'thumb' }),
  );
  btn.addEventListener('click', () => {
    const next = btn.dataset.on !== 'true';
    btn.dataset.on = String(next);
    onChange(next);
  });
  return btn;
}

// ── mode popover ────────────────────────────────────────────────────────

function openModePopover() {
  const pop = $('#popover');
  pop.innerHTML = '';
  pop.append(el('div', { class: 'pop-hd' }, 'Modo de execução'));
  for (const m of MODES) {
    pop.append(
      el('div', {
        class: 'pop-opt', 'data-active': String(m.id === state.mode), role: 'menuitem',
        onclick: () => { state.mode = m.id; syncMode(); closeModePopover(); },
      },
        el('div', { class: 'pop-name-row' },
          el('span', { class: 'pop-name' }, `/${m.label}`),
          el('span', { class: 'pop-hint' }, m.hint),
        ),
        el('div', { class: 'pop-desc' }, m.desc),
      )
    );
  }
  const r = $('#mode-btn').getBoundingClientRect();
  pop.style.top  = (r.bottom + 8) + 'px';
  pop.style.left = r.left + 'px';
  $('#pop-overlay').hidden = false;
  $('#mode-btn').dataset.open = 'true';
}

function closeModePopover() {
  $('#pop-overlay').hidden = true;
  $('#mode-btn').dataset.open = 'false';
}

// ── theme / collapse / notes ─────────────────────────────────────────────

const SVG = {
  sun: `<svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round">
    <circle cx="7" cy="7" r="2.4"/>
    <line x1="7" y1="1.2" x2="7" y2="2.6"/>
    <line x1="7" y1="11.4" x2="7" y2="12.8"/>
    <line x1="1.2" y1="7" x2="2.6" y2="7"/>
    <line x1="11.4" y1="7" x2="12.8" y2="7"/>
    <line x1="3" y1="3" x2="4" y2="4"/>
    <line x1="10" y1="10" x2="11" y2="11"/>
    <line x1="3" y1="11" x2="4" y2="10"/>
    <line x1="10" y1="4" x2="11" y2="3"/>
  </svg>`,
  moon: `<svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1" stroke-linejoin="round">
    <path d="M11.5 8.5 A5 5 0 0 1 5.5 2.5 A5 5 0 1 0 11.5 8.5 Z"/>
  </svg>`,
  chevL: `<svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round"><polyline points="8.5,3.5 5,7 8.5,10.5"/></svg>`,
  chevR: `<svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round"><polyline points="5.5,3.5 9,7 5.5,10.5"/></svg>`,
};

function applyTheme() {
  document.documentElement.setAttribute('data-theme', state.theme);
  const dark = state.theme === 'dark';
  $('#theme-ic').innerHTML  = dark ? SVG.sun  : SVG.moon;
  $('#theme-lbl').textContent = dark ? 'Tema claro' : 'Tema escuro';
}

function applyCollapse() {
  $('#app').dataset.sb = state.collapsed;
  $('#collapse-ic').innerHTML = state.collapsed ? SVG.chevR : SVG.chevL;
  // flex-1 spacer: show only when collapsed (history hidden)
  $('#sb-flex').style.display = state.collapsed ? 'flex' : 'none';
}

function applyNotes() {
  $('#app').dataset.nt = state.notesOpen;
}

// ── nav ──────────────────────────────────────────────────────────────────

function goto(view) {
  state.view = view;
  $$('.screen').forEach(s => s.dataset.active = String(s.dataset.id === view));
  $$('.sb-row[data-nav]').forEach(r => r.dataset.active = String(r.dataset.nav === view));
  if (view === 'library') renderLibrary();
  if (view === 'config')  renderConfig();
}

function syncMode() {
  const m = MODES.find(m => m.id === state.mode) || MODES[1];
  $('#mode-label').textContent = m.label;
}

function syncDensity() {
  $$('.tb-density button').forEach(b =>
    b.dataset.active = String(+b.dataset.d === state.density));
}

function syncSendBtn() {
  const v = $('#in-field').value.trim();
  $('#in-send').disabled = !v || state.running;
}

// ── streaming simulation ─────────────────────────────────────────────────

function runSimulation(query) {
  clearTimers();
  state.running = true;
  state.query   = query;
  state.panels  = MODELS.map(m => ({ id: m.id, name: m.name, status: 'processing', text: '' }));
  renderArena();
  syncSendBtn();

  state.panels.forEach((p, i) => {
    const startAt = 700 + Math.random() * 1100;
    const txt = RESPONSES[p.id];
    const charMs = state.streamSpeed + (i % 3) * 4;

    timers.push(setTimeout(() => {
      state.panels[i].status = 'streaming';
      renderGrid();

      for (let k = 1; k <= txt.length; k++) {
        timers.push(setTimeout(() => {
          state.panels[i].text = txt.slice(0, k);
          renderGrid();
        }, k * charMs));
      }
      timers.push(setTimeout(() => {
        state.panels[i].status = 'done';
        state.panels[i].text   = txt;
        renderArena();
        const allDone = state.panels.every(p => p.status === 'done');
        if (allDone) { state.running = false; syncSendBtn(); }
      }, txt.length * charMs + 100));
    }, startAt));
  });
}

// ── boot ─────────────────────────────────────────────────────────────────

function boot() {
  renderHistory();
  renderChips();
  renderArena();
  syncMode();
  applyTheme();
  applyCollapse();
  applyNotes();

  $('#notes-body').value =
    'Insight: nenhum modelo apresentou contra-mecanismos. Próxima iteração — pedir prescrições.\n\n' +
    'Rever Bourdieu sobre violência simbólica.';

  // nav
  $$('.sb-row[data-nav]').forEach(r =>
    r.addEventListener('click', () => goto(r.dataset.nav)));

  // density
  $$('.tb-density button').forEach(b =>
    b.addEventListener('click', () => {
      state.density = +b.dataset.d;
      syncDensity();
      renderGrid();
    })
  );

  // mode popover
  $('#mode-btn').addEventListener('click', e => {
    e.stopPropagation();
    $('#mode-btn').dataset.open === 'true' ? closeModePopover() : openModePopover();
  });
  $('#pop-overlay').addEventListener('click', e => {
    if (e.target === $('#pop-overlay')) closeModePopover();
  });

  // input
  const submit = () => {
    const v = $('#in-field').value.trim();
    if (!v || state.running) return;
    runSimulation(v);
    $('#in-field').value = '';
    syncSendBtn();
  };
  $('#in-send').addEventListener('click', submit);
  $('#in-field').addEventListener('input',   syncSendBtn);
  $('#in-field').addEventListener('keydown', e => {
    if (e.key === 'Enter') { e.preventDefault(); submit(); }
  });

  // theme
  $('#theme-toggle').addEventListener('click', () => {
    state.theme = state.theme === 'dark' ? 'light' : 'dark';
    applyTheme();
  });

  // collapse
  $('#collapse-toggle').addEventListener('click', () => {
    state.collapsed = !state.collapsed;
    applyCollapse();
  });

  // notes
  $('#notes-toggle').addEventListener('click', () => { state.notesOpen = true;  applyNotes(); });
  $('#notes-close').addEventListener( 'click', () => { state.notesOpen = false; applyNotes(); });

  // library
  $('#lib-search').addEventListener('input', e => {
    state.libQuery = e.target.value; renderLibrary();
  });
  $$('#lib-filters button').forEach(b =>
    b.addEventListener('click', () => {
      state.libFilter = b.dataset.f;
      $$('#lib-filters button').forEach(x => x.dataset.active = String(x === b));
      renderLibrary();
    })
  );

  // keyboard shortcuts
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') closeModePopover();
    if ((e.metaKey || e.ctrlKey) && e.key === '\\') {
      state.collapsed = !state.collapsed; applyCollapse();
    }
    if (e.key === '/' && !['INPUT', 'TEXTAREA'].includes(document.activeElement.tagName)) {
      e.preventDefault(); $('#in-field').focus();
    }
  });
}

boot();
</script>
